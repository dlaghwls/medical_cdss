# OpenMRS Runtime Properties
# Wed May 28 12:50:00 KST 2025 (파일 생성 날짜 예시)

# ===============================================================
# Database Connection Properties
# ===============================================================
# The database driver
# For MySQL, use com.mysql.cj.jdbc.Driver (for Connector/J 8.x)
# or com.mysql.jdbc.Driver (for Connector/J 5.x)
# MySQL 5.7 이미지를 사용하시므로, com.mysql.jdbc.Driver가 더 적합할 수 있습니다.
# 문제가 발생하면 com.mysql.cj.jdbc.Driver로 변경해보세요.
connection.driver_class=com.mysql.jdbc.Driver

# The url to the database.
# 'mysql'은 docker-compose.yml에 정의된 MySQL 서비스 이름입니다.
# 'openmrs'는 docker-compose.yml에서 MYSQL_DATABASE로 설정한 값입니다.
connection.url=jdbc:mysql://mysql:3306/openmrs?autoReconnect=true&sessionVariables=default_storage_engine%3DInnoDB&useUnicode=true&characterEncoding=UTF-8

# The database user
connection.username=openmrs

# The database password
connection.password=Admin123


# ===============================================================
# Installation and Update Properties
# ===============================================================
# Whether or not the webapp should create the database tables
# if they don't exist. (default: false)
create_tables=true

# Whether or not the webapp should attempt to update the database
# on startup. (default: false)
auto_update_database=true


# ===============================================================
# Other Properties
# ===============================================================
# Folder where modules are stored. This is relative to the
# application data directory (see below) unless it starts with
# a "/" or "C:\" or similar (meaning that its an absolute path).
module_repository_folder=modules

# Location for the application data directory.
# OpenMRS will create a subfolder (typically ".OpenMRS" or "openmrs")
# in this location for its runtime data, modules, etc.
# Docker 볼륨으로 /usr/local/tomcat/.OpenMRS 를 사용하므로,
# 이 설정은 해당 경로를 가리키도록 내부적으로 처리될 가능성이 높습니다.
# 명시적으로 지정하지 않아도 이미지가 기본값을 사용할 수 있습니다.
# 문제가 발생하면 이 경로를 확인하거나 OpenMRS 문서를 참조하세요.
# application_data_directory=/usr/local/tomcat/.OpenMRS

# If you want to use a different address for the tomcat instance
# for the scheduler to callback on. Otherwise, defaults to
# localhost. (No need to change unless you know you need to)
# scheduler.host_name=

# If you want to use a different port for the tomcat instance
# for the scheduler to callback on. Otherwise, defaults to the
# current port tomcat is running on. (No need to change unless you know you need to)
# scheduler.port=

# Set this to true if the aformentioned webapp name will be
# correct for all scheduler callbacks. (No need to change unless you know you need to)
# scheduler.fixed_url=false